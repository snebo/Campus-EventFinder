<article class="flex flex-col gap-2 rounded-card border border-border-default bg-surface-elevated p-4">
  <div class="flex items-start justify-between gap-2">
    <h3 class="text-input font-semibold text-text-primary">{{ event().title }}</h3>
    <app-event-badge variant="status" [label]="statusLabel()" />
  </div>

  @if (event().timeLabel; as timeLabel) {
    <app-event-meta-row icon="Clock" [text]="timeLabel" />
  }
  @if (event().location; as location) {
    <app-event-meta-row icon="MapPin" [text]="location" />
  }

  <app-text-link label="View Details" weight="bold" (clicked)="onViewDetails()" />
</article>
