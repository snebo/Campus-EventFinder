<div class="flex flex-col gap-6 p-4">
  <app-page-header
    [greetingName]="userName"
    emoji="👋"
    subtitle="Discover what's happening around campus."
  />

  <app-search-bar
    placeholder="Search events, venues, or organizers"
    [showFilterButton]="false"
    (submit)="onSearchSubmit($event)"
  />

  <div class="flex gap-2 overflow-x-auto pb-1">
    <app-chip
      label="ALL"
      variant="select"
      [selected]="activeCategory() === 'all'"
      (clicked)="onSelectAll()"
    />
    @for (category of categories; track category.value) {
      <app-chip
        [label]="category.label"
        variant="select"
        [selected]="activeCategory() === category.value"
        (clicked)="onSelectCategory(category.value)"
      />
    }
  </div>

  <section class="flex flex-col gap-card-gap">
    <app-section-header title="Upcoming in Unilag" />

    <div class="grid grid-cols-1 gap-card-gap sm:grid-cols-2">
      @for (event of upcomingEvents(); track event.id) {
        <app-event-card-featured [event]="event" (learnMoreClick)="onLearnMore($event)" />
      }
    </div>
  </section>
</div>
