<div class="flex flex-col gap-6 p-4">
  <app-page-header [greetingName]="userName" emoji="👋" subtitle="Discover what's happening around campus." />

  <app-search-bar placeholder="Search events, venues, or organizers" [showFilterButton]="false"
    (submit)="onSearchSubmit($event)" />

  <div class="flex gap-2 overflow-x-auto pb-1">
    <app-chip label="ALL" variant="select" [selected]="activeCategory() === 'all'" (clicked)="onSelectAll()" />
    @for (category of categories; track category.value) {
    <app-chip [label]="category.label" variant="select" [selected]="activeCategory() === category.value"
      (clicked)="onSelectCategory(category.value)" />
    }
  </div>

  <section class="flex flex-col text-sm gap-5 mb-15">
    <div class="flex justify-between uppercase">
      <p class="">upcoming in unilag</p>
      <p class="text-text-secondary">see more</p>
    </div>

    <div class="flex gap-10 overflow-scroll">
      @for (event of upcomingEvents(); track event.id) {
      <app-event-card-featured [event]="event" (learnMoreClick)="onLearnMore($event)" />
      }
    </div>
  </section>

  <section>
    <div class="flex justify-between">
      <p class="mb-7">Trending at Unilag</p>
      <span class="">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
          <path fill-rule="evenodd"
            d="M15.22 6.268a.75.75 0 0 1 .968-.431l5.942 2.28a.75.75 0 0 1 .431.97l-2.28 5.94a.75.75 0 1 1-1.4-.537l1.63-4.251-1.086.484a11.2 11.2 0 0 0-5.45 5.173.75.75 0 0 1-1.199.19L9 12.312l-6.22 6.22a.75.75 0 0 1-1.06-1.061l6.75-6.75a.75.75 0 0 1 1.06 0l3.606 3.606a12.695 12.695 0 0 1 5.68-4.974l1.086-.483-4.251-1.632a.75.75 0 0 1-.432-.97Z"
            clip-rule="evenodd" />
        </svg>
      </span>
    </div>

    <div class="flex flex-col gap-4">
      @for (event of trendingEvents(); track event.id) {
        <app-trending-card
          [event]="event"
          (clicked)="onLearnMore($event)"
        />
      }
    </div>


  </section>
</div>
