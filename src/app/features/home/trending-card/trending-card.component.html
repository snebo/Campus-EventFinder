 <button
      type="button"
      (click)="clicked.emit(event().id)"
      class="flex w-full rounded-md items-center gap-3 border border-text-secondary/30 p-2 text-left transition-colors hover:bg-gray-50"
      
    >
      <div class="size-24 shrink-0">
        @if (event().imageUrl) {
          <img [src]="event().imageUrl" [alt]="event().title" class="h-full w-full rounded-sm overflow-hidden object-cover" />
        } @else {
          <div class="flex h-full items-center justify-center">
            <svg class="h-6 w-6 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z" />
            </svg>
          </div>
        }
      </div>

      <div class="min-w-0 flex-1">
        <p class="truncate text-md font-bold">{{ event().title }}</p>
        <p class="text-sm text-text-secondary">
          {{ event().dateLabel }} &bull; {{ event().attendeeLabel }}
        </p>
      </div>

      <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
      </svg>
    </button>
