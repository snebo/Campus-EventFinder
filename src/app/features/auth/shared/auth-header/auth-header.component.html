<div class="flex items-center justify-between">
  <app-logo [brandName]="brandName()" [size]="lg" />

  @if (showInfo()) {
    <div class="relative">
      <app-icon-button icon="Info" ariaLabel="About Eventfindr" (clicked)="toggleInfoTooltip()" />
      <app-tooltip
        [visible]="showInfoTooltip()"
        [text]="infoTooltipText()"
        variant="neutral"
        (dismiss)="onTooltipDismiss()"
      />
    </div>
  }
</div>
