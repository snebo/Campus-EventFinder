
<div class="mx-auto flex min-h-screen w-full max-w-auth-container flex-col gap-2 p-6">
  <app-auth-header [showInfo]="false" class="self-center my-6"/>

      @if (successSent()) {
          <h1 class="mb-2 text-2xl font-bold">Check your inbox</h1>
          <p class="mb-8 text-sm text-[var(--color-text-muted)]">
            If an account exists for that email, we've sent a password reset link.
          </p>
        } @else {
          <h1 class="mb-1 text-2xl font-bold text-center">Forgot Password</h1>
          <p class="mb-5 text-sm text-center text-[var(--color-text-muted)]">
            Enter your email to reset your password
          </p>

          <app-forgot-password-form (submitForm)="onSubmit($event)" />
        }

        <a routerLink="/login" class="mt-6 text-center inline-block text-sm font-medium underline">
          &larr; Back to Sign In
        </a>
</div>
