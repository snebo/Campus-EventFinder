<form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-field-gap">
  <app-form-field label="Full Name" for="signup-full-name" [errorText]="fullNameErrorText()">
    <app-text-input
      id="signup-full-name"
      formControlName="fullName"
      placeholder="Your name"
      autocomplete="name"
      [invalid]="!!fullNameErrorText()"
    />
  </app-form-field>

  <app-form-field label="Email address" for="signup-email" [errorText]="emailErrorText()">
    <app-text-input
      id="signup-email"
      type="email"
      formControlName="email"
      placeholder="name@email.com"
      autocomplete="email"
      [invalid]="!!emailErrorText()"
    />
  </app-form-field>

  <app-form-field
    label="Password"
    for="signup-password"
    [helperText]="passwordHelperText()"
    [helperTextVariant]="passwordHelperVariant()"
  >
    <app-password-input
      id="signup-password"
      formControlName="password"
      placeholder="enter a password"
      autocomplete="new-password"
    />
  </app-form-field>

  <div class="relative">
    <app-button
      label="Sign Up"
      type="submit"
      [disabled]="!isFormValid()"
      [loading]="isSubmitting()"
    />
    <app-tooltip
      [visible]="showServerErrorTooltip()"
      [text]="serverError() ?? ''"
      variant="error"
      (dismiss)="onServerErrorDismiss()"
    />
  </div>

  <div class="flex items-center gap-4 my-4">
    <div class="flex-1 border-t border-gray-300"></div>
    <span class="text-gray-500 text-sm">OR</span>
    <div class="flex-1 border-t border-gray-300"></div>
  </div>

  <div class="relative">
    <app-button
      label="Continue with Google"
      variant="outline"
      customIcon="./assets/images/google_icon.png"
      [disabled]="false"
      (clicked)="onGoogleSignIn()"
    />
    <app-tooltip
      [visible]="showComingSoon()"
      text="Coming soon"
      variant="info"
      (dismiss)="onComingSoonDismiss()"
    />
  </div>

  <app-auth-footer-link
    promptText="Already have an account?"
    actionText="Sign In"
    (actionClick)="navigateToSignIn.emit()"
  />
</form>
