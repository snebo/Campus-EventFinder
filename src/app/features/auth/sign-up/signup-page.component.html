<div class="mx-auto flex min-h-screen w-full max-w-auth-container flex-col gap-8 p-6">
  <app-auth-header [showInfo]="false" />

  <app-page-header title="Create Account" [subtitle]="subtitle" />

  <app-signup-form
    [isSubmitting]="isSubmitting()"
    [serverError]="serverError()"
    [fieldErrors]="fieldErrors()"
    (submitForm)="onSubmit($event)"
    (navigateToSignIn)="onNavigateToSignIn()"
  />
</div>
