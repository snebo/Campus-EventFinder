<div class="flex flex-col gap-1.5 w-full mb-4">
  <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">{{ label() }}</label>

  <div
    class="relative flex items-center bg-gray-50 border border-gray-200 px-4 py-4 focus-within:border-brand-dark transition-colors"
  >
    <input
      [(ngModel)]="value"
      [type]="type()"
      class="w-full bg-transparent text-md text-gray-800 outline-none pr-8 font-medium"
    />
    <lucide-icon
      name="Pencil"
      [size]="16"
      class="absolute right-4 top-2 text-gray-400 pointer-events-none"
    ></lucide-icon>
  </div>
</div>
