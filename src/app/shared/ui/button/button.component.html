<button [type]="type()" [disabled]="isDisabled()" [class]="buttonClasses()" (click)="onClick()" [routerLink]="routerLink()">
  @if (loading()) {
    <span class="animate-spin" data-testid="button-spinner">
      <lucide-icon name="LoaderCircle" [size]="20" />
    </span>
  }
   @if (customIcon()) {
    <img [src]="customIcon()" class="w-5 h-5" alt="icon" />
  } @else if (icon()) {
    <lucide-icon [name]="icon()"></lucide-icon>
  }
  {{ label() }}
</button>
