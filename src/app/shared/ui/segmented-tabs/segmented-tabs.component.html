<div role="tablist" class="inline-flex rounded-button border border-border-default bg-surface-elevated p-1">
  @for (tab of tabs(); track tab.value) {
    <button
      type="button"
      role="tab"
      [attr.aria-selected]="tab.value === activeValue()"
      [class]="
        'rounded-button px-4 py-1.5 text-label uppercase transition-colors ' +
        (tab.value === activeValue() ? 'bg-chip-bg-selected text-white' : 'bg-transparent text-text-secondary')
      "
      (click)="onSelect(tab.value)"
    >{{ tab.label }}</button>
  }
</div>
