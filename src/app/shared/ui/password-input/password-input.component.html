<div class="relative">
  <app-text-input
    [formControl]="innerControl"
    [placeholder]="placeholder()"
    [type]="type()"
    [id]="id()"
    [disabled]="disabled()"
    [invalid]="invalid()"
    [autocomplete]="autocomplete()"
    (blurred)="onBlurred()"
  />
  <div class="absolute inset-y-0 right-1 flex items-center">
    <app-icon-button [icon]="toggleIcon()" [ariaLabel]="toggleLabel()" (clicked)="toggleVisibility()" />
  </div>
</div>
