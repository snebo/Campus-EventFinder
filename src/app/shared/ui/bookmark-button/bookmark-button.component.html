<button
  type="button"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-pressed]="saved()"
  class="inline-flex h-8 w-8 items-center justify-center rounded-full bg-white/80 text-text-primary shadow-sm backdrop-blur-sm transition-colors hover:bg-white"
  (click)="onClick()"
>
  <lucide-icon [name]="icon()" [size]="18" />
</button>
