@if(!editable()){
  <div [class]="'flex flex-col items-center justify-center border-1 border-black p-4 ' + computedSize()">
    <p class="text-[24px] font-bold">{{value()}}</p>
    <p class="font-medium text-md text-gray-900">{{topic()}}</p>
  </div>
} @else {
  <div [class]="'flex flex-col cursor-pointer items-center bg-none text-gray-400 hover:bg-gray-200 hover:text-gray-700 justify-center border-1 border-dotted border-black p-4 ' + computedSize()" (click)="onClick()">
    <p class="text-[24px] font-bold">{{value()}}</p>
    <p class="font-medium text-md ">{{topic()}}</p>
  </div>
}
